<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>losh - Local Share Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
        }
        h1 {
            color: #38bdf8;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background-color: #0284c7;
            color: #fff;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>losh</h1>
        <p><strong>Local Share</strong> is running successfully!</p>
        <p>This server is configured as a reverse proxy, ready to forward traffic from the public internet to your local environment services.</p>
        <div class="badge">Online & Active</div>
        <div>v0.1.1</div>
    </div>
</body>
</html>
