---
- name: Update Ubuntu and Install Nginx
  hosts: losh_servers
  become: yes
  tasks:
    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow HTTP and HTTPS traffic in UFW (firewall)
      ufw:
        rule: allow
        name: 'Nginx Full'
