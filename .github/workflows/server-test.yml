name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/server-test.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test and Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests
        run: |
          cd server
          go test -v ./...

      - name: Build Test Binary
        run: |
          cd server
          go build -o server main.go
