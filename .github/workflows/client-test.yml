name: Client CI

on:
  push:
    paths:
      - 'client/**'
      - '.github/workflows/client-test.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client-test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test and Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests
        run: |
          cd client
          go test -v ./...

      - name: Build Test Binary
        run: |
          cd client
          go build -o client main.go
